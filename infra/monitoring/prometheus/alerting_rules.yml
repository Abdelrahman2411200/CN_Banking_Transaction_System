groups:
  - name: banking-alerts
    rules:
      # Measures the proportion of 5xx responses over all responses in the last 5 minutes.
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # Uses the HTTP duration histogram to estimate the 99th percentile latency.
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_ms_bucket[5m])) by (job, le)
          ) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 2s on {{ $labels.job }}"
          description: "P99 latency is {{ $value }}ms."

      # Detects bursts of fraud alerts over a 10 minute window.
      - alert: FraudSpikeAlert
        expr: rate(fraud_alerts_triggered_total[10m]) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Fraud alert spike detected"
          description: "Fraud alerts firing at {{ $value }}/s over the last 10 minutes."

      # Flags sustained SAGA compensation activity, which should be rare in normal operation.
      - alert: SagaCompensations
        expr: rate(saga_compensations_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Elevated SAGA compensation rate"
          description: "Compensation rate is {{ $value }}/s."

      # Tracks Kafka backlog exposed by ledger consumers.
      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag on {{ $labels.topic }}/{{ $labels.partition }}"
          description: "Lag is {{ $value }} messages."

      # Fires when Prometheus cannot scrape a configured target.
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }}."
