worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  sendfile on;
  keepalive_timeout 65;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' http: https:" always;

    location = /healthz {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 "ok\n";
    }

    location = /config.js {
      add_header Cache-Control "no-store" always;
      try_files $uri =404;
    }

    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files $uri =404;
    }

    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    location / {
      add_header Cache-Control "no-store" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
