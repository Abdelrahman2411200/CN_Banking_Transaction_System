services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/commands/ruok | grep '\"error\" : null' >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - banking-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_TOPIC_ACCOUNT_CREATED:-bank.account.created} --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_TOPIC_TRANSFER_INITIATED:-bank.transfer.initiated} --partitions 6 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_TOPIC_TRANSFER_COMPLETED:-bank.transfer.completed} --partitions 6 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_TOPIC_TRANSFER_FAILED:-bank.transfer.failed} --partitions 6 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_TOPIC_FRAUD_ALERT:-bank.fraud.alert} --partitions 3 --replication-factor 1 --config retention.ms=2592000000
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - banking-net

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - banking-net

  postgres-accounts:
    image: postgres:16-alpine
    container_name: postgres-accounts
    environment:
      POSTGRES_DB: ${ACCOUNTS_DB_NAME:-accounts_db}
      POSTGRES_USER: ${ACCOUNTS_DB_USER:-accounts_user}
      POSTGRES_PASSWORD: ${ACCOUNTS_DB_PASSWORD:-accounts_pass}
    volumes:
      - postgres_accounts_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ACCOUNTS_DB_USER:-accounts_user} -d ${ACCOUNTS_DB_NAME:-accounts_db}" ]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - banking-net

  postgres-transfers:
    image: postgres:16-alpine
    container_name: postgres-transfers
    environment:
      POSTGRES_DB: ${TRANSFERS_DB_NAME:-transfers_db}
      POSTGRES_USER: ${TRANSFERS_DB_USER:-transfers_user}
      POSTGRES_PASSWORD: ${TRANSFERS_DB_PASSWORD:-transfers_pass}
    volumes:
      - postgres_transfers_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TRANSFERS_DB_USER:-transfers_user} -d ${TRANSFERS_DB_NAME:-transfers_db}" ]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - banking-net

  db-init:
    build:
      context: ./infra/db-init
      dockerfile: Dockerfile
    container_name: db-init
    environment:
      ACCOUNTS_DB_HOST: ${ACCOUNTS_DB_HOST:-postgres-accounts}
      ACCOUNTS_DB_PORT: ${ACCOUNTS_DB_PORT:-5432}
      ACCOUNTS_DB_NAME: ${ACCOUNTS_DB_NAME:-accounts_db}
      ACCOUNTS_DB_USER: ${ACCOUNTS_DB_USER:-accounts_user}
      ACCOUNTS_DB_PASSWORD: ${ACCOUNTS_DB_PASSWORD:-accounts_pass}
      TRANSFERS_DB_HOST: ${TRANSFERS_DB_HOST:-postgres-transfers}
      TRANSFERS_DB_PORT: ${TRANSFERS_DB_PORT:-5432}
      TRANSFERS_DB_NAME: ${TRANSFERS_DB_NAME:-transfers_db}
      TRANSFERS_DB_USER: ${TRANSFERS_DB_USER:-transfers_user}
      TRANSFERS_DB_PASSWORD: ${TRANSFERS_DB_PASSWORD:-transfers_pass}
    depends_on:
      postgres-accounts:
        condition: service_healthy
      postgres-transfers:
        condition: service_healthy
    networks:
      - banking-net

  account-service:
    build:
      context: .
      dockerfile: ./services/account-service/Dockerfile
    container_name: account-service
    environment:
      ACCOUNT_SERVICE_PORT: ${ACCOUNT_SERVICE_PORT:-3001}
      DB_HOST: ${ACCOUNTS_DB_HOST:-postgres-accounts}
      DB_PORT: ${ACCOUNTS_DB_PORT:-5432}
      DB_NAME: ${ACCOUNTS_DB_NAME:-accounts_db}
      DB_USER: ${ACCOUNTS_DB_USER:-accounts_user}
      DB_PASSWORD: ${ACCOUNTS_DB_PASSWORD:-accounts_pass}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-cn-banking-platform}
      KAFKA_GROUP_ID_PREFIX: ${KAFKA_GROUP_ID_PREFIX:-cn-banking}
      KAFKA_TOPIC_ACCOUNT_CREATED: ${KAFKA_TOPIC_ACCOUNT_CREATED:-bank.account.created}
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${ACCOUNT_SERVICE_PORT:-3001}/health >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  transfer-service:
    build:
      context: .
      dockerfile: ./services/transfer-service/Dockerfile
    container_name: transfer-service
    environment:
      TRANSFER_SERVICE_PORT: ${TRANSFER_SERVICE_PORT:-3002}
      DB_HOST: ${TRANSFERS_DB_HOST:-postgres-transfers}
      DB_PORT: ${TRANSFERS_DB_PORT:-5432}
      DB_NAME: ${TRANSFERS_DB_NAME:-transfers_db}
      DB_USER: ${TRANSFERS_DB_USER:-transfers_user}
      DB_PASSWORD: ${TRANSFERS_DB_PASSWORD:-transfers_pass}
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL:-http://account-service:3001}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-cn-banking-platform}
      KAFKA_GROUP_ID_PREFIX: ${KAFKA_GROUP_ID_PREFIX:-cn-banking}
      KAFKA_TOPIC_TRANSFER_INITIATED: ${KAFKA_TOPIC_TRANSFER_INITIATED:-bank.transfer.initiated}
      KAFKA_TOPIC_TRANSFER_COMPLETED: ${KAFKA_TOPIC_TRANSFER_COMPLETED:-bank.transfer.completed}
      KAFKA_TOPIC_TRANSFER_FAILED: ${KAFKA_TOPIC_TRANSFER_FAILED:-bank.transfer.failed}
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${TRANSFER_SERVICE_PORT:-3002}/health >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  ledger-service:
    build:
      context: .
      dockerfile: ./services/ledger-service/Dockerfile
    container_name: ledger-service
    environment:
      LEDGER_SERVICE_PORT: ${LEDGER_SERVICE_PORT:-3003}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-cn-banking-platform}
      KAFKA_GROUP_ID_PREFIX: ${KAFKA_GROUP_ID_PREFIX:-cn-banking}
      KAFKA_TOPIC_TRANSFER_COMPLETED: ${KAFKA_TOPIC_TRANSFER_COMPLETED:-bank.transfer.completed}
      KAFKA_TOPIC_TRANSFER_FAILED: ${KAFKA_TOPIC_TRANSFER_FAILED:-bank.transfer.failed}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-banking_events}
      TRANSFER_SERVICE_URL: ${TRANSFER_SERVICE_URL:-http://transfer-service:3002}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${LEDGER_SERVICE_PORT:-3003}/health >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  fraud-service:
    build:
      context: .
      dockerfile: ./services/fraud-service/Dockerfile
    container_name: fraud-service
    environment:
      FRAUD_SERVICE_PORT: ${FRAUD_SERVICE_PORT:-3004}
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL:-http://account-service:3001}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-cn-banking-platform}
      KAFKA_GROUP_ID_PREFIX: ${KAFKA_GROUP_ID_PREFIX:-cn-banking}
      KAFKA_TOPIC_TRANSFER_INITIATED: ${KAFKA_TOPIC_TRANSFER_INITIATED:-bank.transfer.initiated}
      KAFKA_TOPIC_FRAUD_ALERT: ${KAFKA_TOPIC_FRAUD_ALERT:-bank.fraud.alert}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-banking_events}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      account-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${FRAUD_SERVICE_PORT:-3004}/health >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: notification-service
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-3005}
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL:-http://account-service:3001}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-cn-banking-platform}
      KAFKA_GROUP_ID_PREFIX: ${KAFKA_GROUP_ID_PREFIX:-cn-banking}
      KAFKA_TOPIC_TRANSFER_COMPLETED: ${KAFKA_TOPIC_TRANSFER_COMPLETED:-bank.transfer.completed}
      KAFKA_TOPIC_TRANSFER_FAILED: ${KAFKA_TOPIC_TRANSFER_FAILED:-bank.transfer.failed}
      KAFKA_TOPIC_FRAUD_ALERT: ${KAFKA_TOPIC_FRAUD_ALERT:-bank.fraud.alert}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      account-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${NOTIFICATION_SERVICE_PORT:-3005}/health >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - banking-net

networks:
  banking-net:
    driver: bridge

volumes:
  postgres_accounts_data:
  postgres_transfers_data:
  mongodb_data:
