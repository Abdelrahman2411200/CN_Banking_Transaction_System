apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: monitoring
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: "replace-with-grafana-admin-password"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
  namespace: monitoring
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: monitoring
data:
  all.yml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Banking
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  banking-overview.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "uid": "banking-overview-v1",
      "title": "Banking Overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Requests/s",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m]))", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Error Rate %",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } }, "overrides": [] },
          "targets": [{ "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m])) * 100", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "P50 Latency",
          "gridPos": { "h": 6, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_ms_bucket[5m])) by (le))", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "P95 Latency",
          "gridPos": { "h": 6, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le))", "refId": "A" }]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "P99 Latency",
          "gridPos": { "h": 6, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_ms_bucket[5m])) by (le))", "refId": "A" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Active Transfers/s",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "rate(transfers_initiated_total[1m])", "refId": "A" }]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Fraud Alerts Today",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "increase(fraud_alerts_triggered_total[24h])", "refId": "A" }]
        }
      ]
    }

  transfer-deep-dive.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "uid": "transfer-deep-dive-v1",
      "title": "Transfer Deep Dive",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Transfer Outcomes",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by(status) (rate(transfers_initiated_total[5m]))", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Transfer Amount P95",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(transfer_amount_usd_bucket[5m])) by (le))", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "SAGA Compensations",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "increase(saga_compensations_total[1h])", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "table",
          "title": "Top 10 Slowest Routes",
          "gridPos": { "h": 10, "w": 16, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "topk(10, histogram_quantile(0.99, sum by(route, le) (rate(http_request_duration_ms_bucket{job=\"transfer-service\"}[5m]))))", "refId": "A", "format": "table", "instant": true }]
        }
      ]
    }

  fraud-monitoring.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "uid": "fraud-monitoring-v1",
      "title": "Fraud Monitoring",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "piechart",
          "title": "Alerts by Severity",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by(severity) (fraud_alerts_triggered_total)", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Alerts Over Time by Severity",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by(severity) (rate(fraud_alerts_triggered_total[5m]))", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Rule Trigger Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by(rule_name) (rate(fraud_rules_evaluated_total[5m]))", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Fraud Evaluation Latency P99",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(fraud_evaluation_duration_ms_bucket[5m])) by (le))", "refId": "A" }]
        }
      ]
    }

  infrastructure.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "uid": "infrastructure-v1",
      "title": "Infrastructure",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(http_requests_total, job)",
            "refresh": 1,
            "multi": true,
            "includeAll": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU per Service",
          "repeat": "service",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "rate(process_cpu_seconds_total{job=~\"$service\"}[1m])", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory per Service",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "process_resident_memory_bytes{job=~\"$service\"}", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Kafka Consumer Lag per Topic",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum by(topic) (kafka_consumer_lag)", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Redis Memory Usage",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "redis_memory_used_bytes", "refId": "A" }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "DB Connection Pool",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "db_pool_active_connections", "refId": "A" }]
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.3.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-provisioning-datasources
          configMap:
            name: grafana-provisioning-datasources
        - name: grafana-provisioning-dashboards
          configMap:
            name: grafana-provisioning-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 32000
