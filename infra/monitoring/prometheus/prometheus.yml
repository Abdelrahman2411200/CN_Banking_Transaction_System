global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway.banking.svc.cluster.local:8080']
    metrics_path: /metrics

  - job_name: 'account-service'
    static_configs:
      - targets: ['account-service.banking.svc.cluster.local:3001']
    metrics_path: /metrics

  - job_name: 'transfer-service'
    static_configs:
      - targets: ['transfer-service.banking.svc.cluster.local:3002']
    metrics_path: /metrics

  - job_name: 'ledger-service'
    static_configs:
      - targets: ['ledger-service.banking.svc.cluster.local:3003']
    metrics_path: /metrics

  - job_name: 'fraud-service'
    static_configs:
      - targets: ['fraud-service.banking.svc.cluster.local:3004']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service.banking.svc.cluster.local:3005']
    metrics_path: /metrics

  - job_name: 'kubernetes-pods-banking'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['banking']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
