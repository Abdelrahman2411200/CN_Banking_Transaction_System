apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
type: Opaque
stringData:
  PAGERDUTY_ROUTING_KEY: "replace-with-pagerduty-routing-key"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/replace/with/webhook"
  SMTP_HOST: "smtp.example.com"
  SMTP_FROM: "alerts@example.com"
  SMTP_USER: "replace-with-smtp-user"
  SMTP_PASSWORD: "replace-with-smtp-password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_require_tls: true
      smtp_smarthost: '${SMTP_HOST}:587'
      smtp_from: '${SMTP_FROM}'
      smtp_auth_username: '${SMTP_USER}'
      smtp_auth_password: '${SMTP_PASSWORD}'
    route:
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: pagerduty-critical
          continue: false
        - match:
            severity: warning
          receiver: slack-warnings
          continue: false
    receivers:
      - name: pagerduty-critical
        pagerduty_configs:
          - routing_key: '${PAGERDUTY_ROUTING_KEY}'
            description: '{{ .CommonAnnotations.summary }}'
            details:
              description: '{{ .CommonAnnotations.description }}'
      - name: slack-warnings
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#banking-alerts'
            title: '[WARNING] {{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
            send_resolved: true
      - name: default
        webhook_configs:
          - url: 'http://localhost:5001/alerts'
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --config.expand-env
          envFrom:
            - secretRef:
                name: alertmanager-secrets
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
